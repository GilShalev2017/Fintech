version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# 🐳 DOCKER COMPOSE — Full Infrastructure Stack
# ─────────────────────────────────────────────────────────────────────────────
# Services included:
#   - MongoDB       → primary database
#   - Redis         → caching + session store
#   - Elasticsearch → full-text search
#   - Kibana        → ES visual explorer (dev only)
#   - Kafka         → event streaming / async event bus
#   - Zookeeper     → required coordinator for Kafka
#   - RabbitMQ      → task queues / job processing
#   - SQL Server    → relational database (MSSQL 2022)
#
# Usage:
#   docker compose up -d          → start all services
#   docker compose down -v        → stop and remove volumes
#   docker compose logs -f kafka  → tail a specific service

services:

  # ───────────────────────────────────────────
  # 🍃 MONGODB
  # Primary database. Stores all persistent app data.
  # mongo-express gives a browser UI at http://localhost:8081
  # ───────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: dev-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: app_db
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: dev-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ───────────────────────────────────────────
  # 🔴 REDIS
  # In-memory store used for:
  #   - API response caching
  #   - Session/token storage
  #   - Rate limiting counters
  # appendonly yes → persists data to disk so cache survives restarts.
  # ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ───────────────────────────────────────────
  # 🔍 ELASTICSEARCH
  # Full-text search engine used for:
  #   - Full-text and fuzzy search
  #   - Geo queries
  #   - Analytics aggregations
  # single-node mode is fine for dev/testing.
  # xpack.security disabled to avoid auth setup locally.
  # ───────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: dev-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana — visual UI for Elasticsearch (dev only)
  # Browse indices, run queries, view logs at http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: dev-kibana
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ───────────────────────────────────────────
  # 🦁 ZOOKEEPER (required by Kafka)
  # Coordinates Kafka brokers — cluster metadata,
  # leader election, topic configs.
  # Kafka requires Zookeeper to be healthy before starting.
  # ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: dev-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ───────────────────────────────────────────
  # 📨 KAFKA
  # Event streaming platform used for:
  #   - Lifecycle events (created, updated, cancelled)
  #   - Async notifications pipeline
  #   - Audit trail / event sourcing
  #   - Decoupling services in a microservice setup
  #
  # KAFKA_ADVERTISED_LISTENERS: what address Kafka tells clients to connect to.
  # PLAINTEXT_HOST → for apps running on your host machine (localhost:29092)
  # PLAINTEXT      → for other containers in this Docker network (kafka:9092)
  # ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dev-kafka
    ports:
      - "29092:29092"   # host machine access
      - "9092:9092"     # inter-container access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka UI — visual topic/message browser at http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dev-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ───────────────────────────────────────────
  # 🐰 RABBITMQ
  # Message broker used for:
  #   - Background job queues (email sending, PDF generation)
  #   - Delayed/scheduled tasks
  #   - Work distribution across multiple workers
  #
  # Kafka vs RabbitMQ — why both?
  #   Kafka = event log (ordered, replayable, high-throughput streams)
  #   RabbitMQ = task queue (each message consumed once, ack/nack, retries)
  # Management UI at http://localhost:15672 (guest/guest)
  # ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dev-rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol port (app connections)
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ───────────────────────────────────────────
  # 🗄️ SQL SERVER (MSSQL 2022)
  # Microsoft SQL Server for relational data.
  # Used when you need structured/tabular data, complex joins,
  # stored procedures, or need to demo SQL skills alongside NoSQL.
  #
  # ⚠️  SA_PASSWORD requirements (enforced by MSSQL):
  #     Must be 8+ chars, include uppercase, lowercase,
  #     digit AND special character — or the container will crash silently.
  #
  # ACCEPT_EULA=Y is mandatory — Microsoft requires explicit license acceptance.
  # MSSQL_PID=Developer → free Developer edition (full features, non-production).
  #
  # Connect via any SQL client (Azure Data Studio, DBeaver, TablePlus):
  #   Host: localhost  Port: 1433  User: sa  Password: Dev@password123
  # ───────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dev-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@password123"
      MSSQL_PID: "Developer"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dev@password123' -No -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s   # MSSQL takes longer to boot than other services

# ─────────────────────────────────────────────
# 💾 NAMED VOLUMES
# Docker manages these — data persists across container restarts.
# ─────────────────────────────────────────────
volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
  es-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  rabbitmq-data:
    driver: local
  mssql-data:
    driver: local